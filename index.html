                content: `
                    <p class="mb-2">All certificated aircraft have instruments (even hot air balloons/gliders require basic ones). Modern small single-engine airplanes have significantly more sophisticated instruments than 1940s airliners (like the Piper Cub).</p>
                    <p class="mb-2"><strong>Purpose:</strong> Provide critical information for safe and efficient aircraft operation. When all visual references outside disappear, pilots must rely on these instruments.</p>
                    <p class="mb-2 font-bold text-blue-800">Six Basic Instruments (Standard "Six-Pack" Configuration):</p>
                    <ul class="list-disc pl-5 space-y-1 mb-2">
                        <li><strong>Top Row:</strong> Airspeed Indicator (A/S), Attitude Indicator / Artificial Horizon (A/H), Altimeter (ALT)</li>

                    </ul>
                `

                content: `
                    <p class="font-bold mb-1 text-blue-800">A. According to Application:</p>
                    <ul class="list-disc pl-5 mb-4 space-y-1">
                        <li><strong>Powerplant:</strong> Info related to the aircraft's engine(s).</li>
                        <li><strong>Flight and Navigation:</strong> Altitude, speed, navigating data.</li>

                    <ul class="list-disc pl-5 space-y-1">
                        <li><strong>Pressure:</strong> Measures pressure of air, fuel, oil.</li>
                        <li><strong>Mechanical:</strong> Uses mechanical systems to obtain/transmit info.</li>

                        <li><strong>Electrical/Electronic:</strong> Rapidly changing due to digital tech.</li>
                    </ul>
                `

            {

                content: `
                    <p class="mb-3"><strong>Placement:</strong> Standard layout directly in front of pilot for easy scanning and easier transition to different airplanes.</p>
                    <p class="font-bold mb-1 text-blue-800">Standard Sizes (Round):</p>
                    <ul class="list-disc pl-5 mb-4 space-y-1">
                        <li><strong>1":</strong> Often a vacuum gauge (single-engine).</li>
                        <li><strong>2" Flangeless:</strong> Many turbine engine powerplant instruments.</li>
                        <li><strong>2-1/4":</strong> Common size for many.</li>
                        <li><strong>3-1/8":</strong> Standard full-size instrument.</li>
                        <li><strong>4":</strong> Older style gyro (seldom used today).</li>

                    <p class="font-bold mb-1 text-blue-800">Installation Methods:</p>
                    <ul class="list-disc pl-5 mb-4 space-y-1">
                        <li><strong>Screws:</strong> Non-magnetic fine thread machine screws (brass w/ black oxide finish are very common).</li>
                        <li><strong>Circumferential Clamps:</strong> Fasten to back of panel, operate somewhat like hose clamps.</li>
                        <li><strong>Brackets:</strong> Small "L" or "U" shaped brackets on studs.</li>
                    </ul>
                    <p class="font-bold mb-1 text-blue-800">Lighting Types (Care must be taken to ensure they don't short out):</p>
                    <ul class="list-disc pl-5 space-y-1">
                        <li><strong>Eyebrow:</strong> Small semi-circular fixtures fitting over the top of a round instrument.</li>
                        <li><strong>Post:</strong> Small round lights installed into holes in the panel.</li>
                        <li><strong>Internal:</strong> Inside the instrument case.</li>
                        <li><strong>Flood:</strong> Aimed at panel, shielded from pilot's eyes (often a back-up lighting system).</li>
                    </ul>
                `
            },
            {

                    <p class="mb-2 italic text-sm text-slate-600">These markings are normally on the face of the instrument, inside the cover glass to indicate safe operating values.</p>
                    <ul class="list-disc pl-5 space-y-2">

                        <li><strong>Green Arc:</strong> Normal operating range.</li>

                        <li><strong>Diaphragm (Pressure Capsule):</strong> Thin, lens-shaped hollow metal container. Uses springy metal (often beryllium copper). Measures low pressure (e.g., altimeter, airspeed).</li>
                        <li><strong>Bellows:</strong> Longer than a diaphragm, features accordion folds for greater range of motion. Commonly measures low or differential pressure (can be divided into two chambers).</li>

                        <li><strong>Differential (PSID):</strong> Two different pressures compared to each other in the aircraft.</li>

                    <ul class="list-disc pl-5 mb-4 space-y-2">
                        <li><strong>Pitot Tube:</strong> Open tube facing forward into relative wind; measures RAM pressure. Has internal heaters (35w/100w), a baffle plate, and a drain hole.</li>
                        <li><strong>Static Ports:</strong> Openings at right angles to relative wind; measures STATIC pressure (unaffected by speed). Usually paired on fuselage sides or integrated into the pitot tube.</li>
                    </ul>
                    <p class="font-bold mb-1 text-blue-800">Altimeter Specifics:</p>
                    <p class="mb-2">Measures atmospheric pressure to display altitude in MSL (Mean Sea Level, referenced to major oceans). Internally consists of <strong>three diaphragms in series</strong> (Aneroid wafers) evacuated to an internal pressure of <strong>29.92 "Hg</strong>. This provides sensitivity to read altitudes of <strong>35,000 to 50,000 ft. or more</strong>.</p>

                    <ul class="list-disc pl-5 mb-4 space-y-1">
                        <li><strong>QNH (Query Nautical Height):</strong> Pressure measured from the sea level.</li>
                        <li><strong>QNE (Query Nautical Equivalent):</strong> Pressure measured from standard datum (29.92" / 1013.2 hPa).</li>
                        <li><strong>QFE (Query Field Elevation):</strong> Pressure measured from the Earth's surface (Runway).</li>
                    </ul>
                    <p><strong>Encoding Altimeter (Mode C):</strong> Sends aircraft altitude data to ground radar via a transponder.</p>
                `

                    <p class="font-bold mb-1 text-blue-800">Types of Airspeed:</p>
                    <ul class="list-disc pl-5 mb-4 space-y-1">

                    <div className="w-full flex justify-between items-center mb-4 px-2">
                        <h2 className="text-xl md:text-2xl font-bold text-slate-800 flex items-center">
                            <i className="ph-fill ph-cards text-blue-600 mr-2"></i> Flashcards
                        </h2>
                        <span className="font-semibold text-slate-500 bg-slate-200 px-3 py-1 rounded-full text-xs md:text-sm">
                            {currentIndex + 1} / {flashcardsData.length}
                        </span>
                    </div>

                    {/* Mobile-Optimized Card Container */}
                    <div className="relative w-full min-h-[350px] md:min-h-[400px] perspective-1000 cursor-pointer" onClick={() => setIsFlipped(!isFlipped)}>
                        <div className={`w-full h-full relative transform-style-3d transition-transform duration-500 ${isFlipped ? 'rotate-y-180' : ''}`}>
                            
                            {/* Front (Question) */}
                            <div className="absolute w-full h-full backface-hidden bg-white rounded-2xl shadow-md border-2 border-blue-100 flex flex-col justify-center items-center p-6 md:p-8 text-center">
                                <div className="absolute top-4 left-4 text-blue-300">
                                    <i className="ph-fill ph-question text-2xl md:text-3xl"></i>
                                </div>
                                <div className="w-full max-h-full overflow-y-auto no-scrollbar pt-6 pb-6">
                                    <p className="text-lg md:text-2xl font-bold text-slate-700 whitespace-pre-line">{flashcardsData[currentIndex].q}</p>
                                </div>
                                <p className="absolute bottom-4 text-slate-400 text-xs md:text-sm font-medium animate-pulse">Tap to flip</p>
                            </div>

                            {/* Back (Answer) */}
                            <div className="absolute w-full h-full backface-hidden rotate-y-180 bg-blue-600 rounded-2xl shadow-lg border-2 border-blue-700 flex flex-col items-center justify-center p-6 md:p-8 text-center text-white">
                                <div className="absolute top-4 left-4 text-blue-300">
                                    <i className="ph-fill ph-lightbulb text-2xl md:text-3xl"></i>
                                </div>
                                <div className="w-full max-h-full overflow-y-auto no-scrollbar pt-8 pb-4">
                                    <p className="text-base md:text-xl font-medium leading-relaxed whitespace-pre-line text-left inline-block">{flashcardsData[currentIndex].a}</p>
                                </div>
                            </div>

                        </div>
                    </div>

                    {/* Controls */}
                    <div className="flex gap-3 mt-6 w-full justify-center px-2">
                        <button onClick={prevCard} className="flex-1 max-w-[140px] bg-slate-200 hover:bg-slate-300 text-slate-700 py-3 md:py-4 rounded-xl font-bold flex items-center justify-center transition-colors active:bg-slate-400">
                            <i className="ph-bold ph-caret-left mr-1 md:mr-2 text-lg"></i> Prev
                        </button>
                        <button onClick={nextCard} className="flex-1 max-w-[140px] bg-blue-600 hover:bg-blue-700 text-white py-3 md:py-4 rounded-xl font-bold flex items-center justify-center shadow-md transition-colors active:bg-blue-800">
                            Next <i className="ph-bold ph-caret-right ml-1 md:ml-2 text-lg"></i>
                        </button>
                    </div>
                </div>
            );
        };

        const Quiz = () => {
            const [currentQ, setCurrentQ] = useState(0);
            const [selected, setSelected] = useState(null);
            const [score, setScore] = useState(0);
            const [isFinished, setIsFinished] = useState(false);
            const [showExplanation, setShowExplanation] = useState(false);

            const handleSelect = (idx) => {
                if (selected !== null) return; 
                setSelected(idx);
                setShowExplanation(true);
                if (idx === quizQuestions[currentQ].answer) {
                    setScore(prev => prev + 1);
                }
            };

            const nextQuestion = () => {
                setSelected(null);
                setShowExplanation(false);
                if (currentQ + 1 < quizQuestions.length) {
                    setCurrentQ(prev => prev + 1);
                } else {
                    setIsFinished(true);
                }
            };

            const restartQuiz = () => {
                setCurrentQ(0);
                setSelected(null);
                setScore(0);
                setIsFinished(false);
                setShowExplanation(false);
            };

            if (isFinished) {
                const percentage = Math.round((score / quizQuestions.length) * 100);
                return (
                    <div className="max-w-2xl mx-auto bg-white rounded-xl shadow-sm border border-slate-200 p-6 md:p-8 text-center mt-6 md:mt-10">
                        <i className={`ph-fill ${percentage >= 80 ? 'ph-trophy text-yellow-500' : 'ph-warning-circle text-orange-500'} text-5xl md:text-6xl mb-4`}></i>
                        <h2 className="text-2xl md:text-3xl font-bold text-slate-800 mb-2">Quiz Complete!</h2>
                        <p className="text-base md:text-lg text-slate-600 mb-6">You scored {score} out of {quizQuestions.length} ({percentage}%)</p>
                        
                        <div className="w-full bg-slate-200 rounded-full h-3 md:h-4 mb-8">
                            <div className={`h-full rounded-full transition-all duration-1000 ${percentage >= 80 ? 'bg-green-500' : percentage >= 50 ? 'bg-yellow-500' : 'bg-red-500'}`} style={{ width: `${percentage}%` }}></div>
                        </div>

                        <button onClick={restartQuiz} className="bg-blue-600 hover:bg-blue-700 text-white px-6 md:px-8 py-3 md:py-4 rounded-xl font-bold shadow-md transition-colors flex items-center justify-center mx-auto active:bg-blue-800">
                            <i className="ph-bold ph-arrow-counter-clockwise mr-2 text-lg"></i> Retake Quiz
                        </button>
                    </div>
                );
            }

            const q = quizQuestions[currentQ];

            return (
                <div className="max-w-3xl mx-auto pb-10">
                    <div className="flex justify-between items-end mb-3 px-1 md:px-2">
                        <h2 className="text-xl md:text-2xl font-bold text-slate-800 flex items-center">
                            <i className="ph-fill ph-exam text-blue-600 mr-2"></i> Knowledge Check
                        </h2>
                        <span className="text-xs md:text-sm font-bold text-slate-500 bg-slate-200 px-2 py-1 rounded-md">
                            Q {currentQ + 1} / {quizQuestions.length}
                        </span>
                    </div>

                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        {/* Progress Bar */}
                        <div className="h-1.5 w-full bg-slate-100">
                            <div className="h-full bg-blue-500 transition-all duration-300" style={{ width: `${((currentQ) / quizQuestions.length) * 100}%` }}></div>
                        </div>

                        <div className="p-4 md:p-8">
                            <h3 className="text-lg md:text-2xl font-semibold text-slate-800 mb-5 md:mb-6 leading-relaxed">
                                {q.question}
                            </h3>

                            <div className="space-y-3">
                                {q.options.map((opt, idx) => {
                                    let btnClass = "w-full text-left p-4 md:p-5 rounded-xl border-2 font-medium transition-all duration-200 flex justify-between items-center active:scale-[0.99] ";
                                    
                                    if (selected === null) {
                                        btnClass += "border-slate-200 hover:border-blue-400 hover:bg-blue-50 text-slate-700 cursor-pointer";
                                    } else {
                                        if (idx === q.answer) {
                                            btnClass += "border-green-500 bg-green-50 text-green-800"; 
                                        } else if (idx === selected) {
                                            btnClass += "border-red-500 bg-red-50 text-red-800"; 
                                        } else {
                                            btnClass += "border-slate-100 bg-slate-50 text-slate-400 opacity-60 cursor-not-allowed"; 
                                        }
                                    }

                                    return (
                                        <button 
                                            key={idx} 
                                            onClick={() => handleSelect(idx)}
                                            className={btnClass}
                                            disabled={selected !== null}
                                        >
                                            <span className="text-sm md:text-base pr-2 leading-tight">{opt}</span>
                                            {selected !== null && idx === q.answer && <i className="ph-bold ph-check-circle text-green-600 text-xl flex-shrink-0"></i>}
                                            {selected !== null && idx === selected && idx !== q.answer && <i className="ph-bold ph-x-circle text-red-600 text-xl flex-shrink-0"></i>}
                                        </button>
                                    )
                                })}
                            </div>

                            {showExplanation && (
                                <div className="mt-6 md:mt-8 flex justify-end">
                                    <button 
                                        onClick={nextQuestion}
                                        className="w-full md:w-auto bg-slate-800 hover:bg-slate-900 text-white px-8 py-4 md:py-3 rounded-xl font-bold shadow-md transition-colors flex items-center justify-center active:bg-black"
                                    >
                                        {currentQ + 1 === quizQuestions.length ? 'Finish Quiz' : 'Next Question'} 
                                        <i className="ph-bold ph-arrow-right ml-2 text-lg"></i>
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('study');

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header */}
                    <header className="bg-slate-900 text-white shadow-md">
                        <div className="max-w-6xl mx-auto px-4 py-5 md:py-6">
                            <h1 className="text-xl md:text-3xl font-extrabold tracking-tight flex items-center">
                                <i className="ph-fill ph-airplane-tilt mr-2 md:mr-3 text-blue-400 text-2xl md:text-3xl"></i>
                                Avionics: Instruments
                            </h1>
                            <p className="text-slate-400 mt-1 text-xs md:text-base">Comprehensive Interactive Reviewer (Part 1)</p>
                        </div>
                    </header>

                    {/* Navigation Tabs - Mobile Scrollable */}
                    <div className="bg-white border-b border-slate-200 sticky top-0 z-10 shadow-sm">
                        <div className="max-w-6xl mx-auto flex overflow-x-auto no-scrollbar touch-pan-x">
                            <button 
                                onClick={() => setActiveTab('study')}
                                className={`flex-1 min-w-[120px] py-4 px-2 font-bold text-sm md:text-base border-b-4 transition-colors flex justify-center items-center ${activeTab === 'study' ? 'border-blue-600 text-blue-600 bg-blue-50/50' : 'border-transparent text-slate-500 hover:text-slate-800 hover:bg-slate-50'}`}
                            >
                                <i className="ph-bold ph-book-open mr-1.5 md:mr-2 text-lg"></i> Notes
                            </button>
                            <button 
                                onClick={() => setActiveTab('flashcards')}
                                className={`flex-1 min-w-[120px] py-4 px-2 font-bold text-sm md:text-base border-b-4 transition-colors flex justify-center items-center ${activeTab === 'flashcards' ? 'border-blue-600 text-blue-600 bg-blue-50/50' : 'border-transparent text-slate-500 hover:text-slate-800 hover:bg-slate-50'}`}
                            >
                                <i className="ph-bold ph-cards mr-1.5 md:mr-2 text-lg"></i> Flashcards
                            </button>
                            <button 
                                onClick={() => setActiveTab('quiz')}
                                className={`flex-1 min-w-[120px] py-4 px-2 font-bold text-sm md:text-base border-b-4 transition-colors flex justify-center items-center ${activeTab === 'quiz' ? 'border-blue-600 text-blue-600 bg-blue-50/50' : 'border-transparent text-slate-500 hover:text-slate-800 hover:bg-slate-50'}`}
                            >
                                <i className="ph-bold ph-exam mr-1.5 md:mr-2 text-lg"></i> Quiz
                            </button>
                        </div>
                    </div>

                    {/* Main Content Area */}
                    <main className="flex-1 p-3 sm:p-4 md:p-8">
                        {activeTab === 'study' && <StudyGuide />}
                        {activeTab === 'flashcards' && <Flashcards />}
                        {activeTab === 'quiz' && <Quiz />}
                    </main>

                    <footer className="bg-slate-800 text-slate-400 text-center py-6 px-4 text-xs md:text-sm">
                        <p>Extracted explicitly from: AVIONICS-AS-PPT-7-AIRCRAFT-INSTRUMENTS-PART-1</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
